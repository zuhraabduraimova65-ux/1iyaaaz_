<!DOCTYPE html>
<html lang="en">

<head>

    <title>Zuhra</title>

<body>

    <div class="container">
        <h2>Login</h2>
        <p class="subtitle">Don't have an account yet? <a href="#">Sign up for free</a></p>

        <form>
            <label>Username Or Email</label>
            <input type="text" placeholder="Ali">

            <label>Password</label>
            <input type="password" placeholder="****">

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot your password?</a>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>


    <div class="card">

        <img src="https://picsum.photos/300/200" alt="uy rasmi">

        <div class="content">
            <div class="price">700 ming so‘m</div>

            <div class="btn">Bog‘lanish</div>

            <div class="info">
                <span><b>Xonalar:</b> 2 xona</span>
                <span><b>Qavat:</b> 1-qavat</span>
                <span><b>Maydon:</b> 80 m²</span>
                <span><b>Ta’mir:</b> O‘rtacha</span>
                <span><b>Holati:</b> Yangi</span>
            </div>
        </div>

    </div>



</body>
